<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<defs>
  <radialGradient id="kbg" cx="50%" cy="30%" r="60%">
    <stop offset="0%" stop-color="#200810"/>
    <stop offset="100%" stop-color="#060206"/>
  </radialGradient>
  <radialGradient id="kface" cx="34%" cy="26%" r="65%">
    <stop offset="0%" stop-color="#f8d8c8"/>
    <stop offset="55%" stop-color="#e8b898"/>
    <stop offset="100%" stop-color="#c08060"/>
  </radialGradient>
  <radialGradient id="koutfit" cx="34%" cy="22%" r="68%">
    <stop offset="0%" stop-color="#ff5070"/>
    <stop offset="55%" stop-color="#cc2040"/>
    <stop offset="100%" stop-color="#680820"/>
  </radialGradient>
  <radialGradient id="kfox" cx="35%" cy="28%" r="66%">
    <stop offset="0%" stop-color="#f8f0e0"/>
    <stop offset="55%" stop-color="#e8d8b8"/>
    <stop offset="100%" stop-color="#c0a870"/>
  </radialGradient>
  <filter id="kglow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="200" height="200" fill="url(#kbg)"/>

<!-- red ambient glow -->
<circle cx="100" cy="90" r="66" fill="#cc2040" opacity="0.07" filter="url(#kglow)"/>

<!-- LONG HAIR — Kiriko's most distinctive feature -->
<!-- main hair body (flowing on both sides) -->
<path d="M52 50 Q36 70 30 100 Q26 130 32 170 Q40 190 50 200 L60 200 Q44 180 42 158 Q38 128 44 100 Q50 74 64 58 Z" fill="#0c0606"/>
<path d="M148 50 Q164 70 170 100 Q174 130 168 170 Q160 190 150 200 L140 200 Q156 180 158 158 Q162 128 156 100 Q150 74 136 58 Z" fill="#0c0606"/>
<!-- hair behind face (depth) -->
<path d="M60 46 Q48 68 46 100 Q44 130 48 160" stroke="#0a0404" stroke-width="10" fill="none" stroke-linecap="round"/>
<path d="M140 46 Q152 68 154 100 Q156 130 152 160" stroke="#0a0404" stroke-width="10" fill="none" stroke-linecap="round"/>
<!-- hair top -->
<path d="M64 40 Q100 28 136 40 Q136 50 100 46 Q64 50 64 40 Z" fill="#0e0808"/>
<!-- hair sheen -->
<path d="M68 44 Q100 34 130 44" stroke="#2a1212" stroke-width="2.5" fill="none" opacity="0.6"/>

<!-- FACE -->
<circle cx="101" cy="90" r="44" fill="#703030" opacity="0.4"/>
<circle cx="100" cy="88" rx="42" ry="44" fill="url(#kface)"/>
<!-- use ellipse for face shape -->
<ellipse cx="100" cy="88" rx="42" ry="44" fill="url(#kface)"/>

<!-- eyebrows (elegant, thin) -->
<path d="M74 74 Q84 70 94 73" stroke="#2a1010" stroke-width="2.2" fill="none" stroke-linecap="round"/>
<path d="M106 73 Q116 70 126 74" stroke="#2a1010" stroke-width="2.2" fill="none" stroke-linecap="round"/>

<!-- eyes (dark, focused) -->
<ellipse cx="83" cy="83" rx="11" ry="8.5" fill="#1a0808"/>
<ellipse cx="117" cy="83" rx="11" ry="8.5" fill="#1a0808"/>
<ellipse cx="83" cy="83" rx="7.5" ry="6" fill="#3a1818"/>
<ellipse cx="117" cy="83" rx="7.5" ry="6" fill="#3a1818"/>
<circle cx="81" cy="82" r="2.5" fill="#e0c8b8" opacity="0.5"/>
<circle cx="115" cy="82" r="2.5" fill="#e0c8b8" opacity="0.5"/>
<!-- eyeliner -->
<path d="M72 80 Q83 76 94 80 L92 82 Q83 78 74 82 Z" fill="#1a0808" opacity="0.7"/>
<path d="M106 80 Q117 76 128 80 L126 82 Q117 78 108 82 Z" fill="#1a0808" opacity="0.7"/>

<!-- nose (small, delicate) -->
<path d="M97 95 Q100 99 103 95" stroke="#c09080" stroke-width="1.5" fill="none"/>

<!-- mouth (composed, slight smile) -->
<path d="M86 108 Q100 114 114 108" stroke="#c08060" stroke-width="2.2" fill="none" stroke-linecap="round"/>
<path d="M90 109 Q100 113 110 109" stroke="#d09070" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>

<!-- gold hairpin -->
<line x1="112" y1="55" x2="126" y2="48" stroke="#f8d040" stroke-width="2.5" stroke-linecap="round"/>
<circle cx="127" cy="47" r="3.5" fill="#f8d040"/>
<circle cx="127" cy="47" r="2" fill="#ffe878"/>

<!-- FOX companion — upper right corner -->
<!-- fox body -->
<ellipse cx="166" cy="62" rx="22" ry="16" fill="#f0d898" opacity="0.9"/>
<ellipse cx="166" cy="62" rx="19" ry="13" fill="url(#kfox)"/>
<!-- fox head -->
<circle cx="154" cy="54" r="13" fill="#e8c880"/>
<circle cx="154" cy="54" r="11" fill="url(#kfox)"/>
<!-- fox ears -->
<polygon points="144,44 148,30 154,44" fill="#e8c880"/>
<polygon points="146,43 149,33 153,43" fill="#ffaaaa" opacity="0.7"/>
<polygon points="158,43 162,30 164,44" fill="#e8c880"/>
<polygon points="159,43 162,33 163,43" fill="#ffaaaa" opacity="0.7"/>
<!-- fox face -->
<ellipse cx="154" cy="56" rx="7" ry="5" fill="#f8e8d0" opacity="0.7"/>
<!-- fox eyes -->
<circle cx="150" cy="52" r="2.5" fill="#2a1a08"/>
<circle cx="158" cy="52" r="2.5" fill="#2a1a08"/>
<circle cx="149" cy="51" r="1" fill="#f0e0c0" opacity="0.6"/>
<circle cx="157" cy="51" r="1" fill="#f0e0c0" opacity="0.6"/>
<!-- fox nose -->
<ellipse cx="154" cy="57" rx="2" ry="1.5" fill="#d08060"/>
<!-- fox tail hint -->
<path d="M178 68 Q190 56 186 46 Q182 40 178 46 Q182 54 176 62 Z" fill="#f0d898" opacity="0.7"/>
<path d="M179 68 Q188 58 184 48 Q182 44 180 48 Q183 54 177 62 Z" fill="#f8f0e0" opacity="0.5"/>

<!-- RED OUTFIT / collar -->
<path d="M42 148 L158 148 L166 200 L34 200 Z" fill="#5a0818"/>
<path d="M52 148 L148 148 L154 200 L46 200 Z" fill="url(#koutfit)"/>
<!-- kimono collar (white V-neck) -->
<path d="M78 140 L100 165 L122 140 L118 136 L100 160 L82 136 Z" fill="#f0ece8"/>
<path d="M80 140 L100 162 L120 140 L116 138 L100 159 L84 138 Z" fill="#e8e4e0" opacity="0.6"/>
<!-- red collar overlap -->
<path d="M52 148 L78 140 L82 148 L60 148 Z" fill="#cc2040"/>
<path d="M148 148 L122 140 L118 148 L140 148 Z" fill="#cc2040"/>
<!-- sash -->
<path d="M70 170 L130 170 L132 184 L68 184 Z" fill="#880820" opacity="0.8"/>
<path d="M72 172 L128 172 L130 182 L70 182 Z" fill="#f0d040" opacity="0.35"/>
<!-- kunai / needle weapons (subtle) -->
<line x1="44" y1="152" x2="50" y2="200" stroke="#c0c0c8" stroke-width="1.5" opacity="0.4"/>
<line x1="156" y1="152" x2="150" y2="200" stroke="#c0c0c8" stroke-width="1.5" opacity="0.4"/>
</svg>