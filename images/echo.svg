<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<defs>
  <radialGradient id="ebg" cx="50%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#081828"/>
    <stop offset="100%" stop-color="#020810"/>
  </radialGradient>
  <radialGradient id="ebody" cx="32%" cy="25%" r="68%">
    <stop offset="0%" stop-color="#e8f4ff"/>
    <stop offset="45%" stop-color="#b0d4ff"/>
    <stop offset="100%" stop-color="#2858a0"/>
  </radialGradient>
  <radialGradient id="ewing" cx="35%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#c8e8ff"/>
    <stop offset="65%" stop-color="#88c0ff"/>
    <stop offset="100%" stop-color="#3060a0"/>
  </radialGradient>
  <filter id="eglow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="eeyeglow" x="-100%" y="-80%" width="300%" height="260%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="200" height="200" fill="url(#ebg)"/>

<!-- blue ambient glow -->
<ellipse cx="100" cy="90" rx="65" ry="55" fill="#4090ff" opacity="0.07" filter="url(#eglow)"/>

<!-- WINGS — most distinctive Echo feature -->
<!-- left wing panel -->
<polygon points="8,50 48,72 52,130 8,110" fill="#1a3870" opacity="0.75"/>
<polygon points="10,52 46,72 50,128 10,108" fill="url(#ewing)" opacity="0.55"/>
<line x1="10" y1="60" x2="46" y2="78" stroke="#88c8ff" stroke-width="1.2" opacity="0.4"/>
<line x1="10" y1="74" x2="46" y2="90" stroke="#88c8ff" stroke-width="1.2" opacity="0.4"/>
<line x1="10" y1="88" x2="46" y2="104" stroke="#88c8ff" stroke-width="1.2" opacity="0.4"/>
<!-- right wing panel -->
<polygon points="192,50 152,72 148,130 192,110" fill="#1a3870" opacity="0.75"/>
<polygon points="190,52 154,72 150,128 190,108" fill="url(#ewing)" opacity="0.55"/>
<line x1="190" y1="60" x2="154" y2="78" stroke="#88c8ff" stroke-width="1.2" opacity="0.4"/>
<line x1="190" y1="74" x2="154" y2="90" stroke="#88c8ff" stroke-width="1.2" opacity="0.4"/>
<line x1="190" y1="88" x2="154" y2="104" stroke="#88c8ff" stroke-width="1.2" opacity="0.4"/>

<!-- BODY — angular diamond shape -->
<!-- body shadow -->
<polygon points="100,30 162,82 150,160 50,160 38,82" fill="#0a1828" opacity="0.6"/>
<!-- main body -->
<polygon points="100,28 160,80 148,158 52,158 40,80" fill="url(#ebody)"/>
<!-- face panel interior (slightly darker) -->
<polygon points="100,44 144,84 134,148 66,148 56,84" fill="#c8e0ff" opacity="0.4"/>
<!-- inner glow panel -->
<polygon points="100,52 136,86 128,142 72,142 64,86" fill="#d8ecff" opacity="0.25"/>

<!-- EYE STRIPE — single horizontal glowing bar, Echo's signature -->
<rect x="56" y="88" width="88" height="18" rx="4" fill="#0a2040"/>
<rect x="58" y="90" width="84" height="14" rx="3" fill="#f0d820" filter="url(#eeyeglow)"/>
<rect x="62" y="92" width="76" height="10" rx="3" fill="#ffe840"/>
<rect x="68" y="93" width="64" height="7" rx="2" fill="#fff090" opacity="0.7"/>
<!-- eye stripe end caps (slightly darker) -->
<rect x="56" y="88" width="12" height="18" rx="4" fill="#0a2040" opacity="0.4"/>
<rect x="132" y="88" width="12" height="18" rx="4" fill="#0a2040" opacity="0.4"/>

<!-- angular face geometry lines -->
<line x1="76" y1="68" x2="100" y2="56" stroke="#90c8ff" stroke-width="1.5" opacity="0.35"/>
<line x1="124" y1="68" x2="100" y2="56" stroke="#90c8ff" stroke-width="1.5" opacity="0.35"/>
<line x1="66" y1="78" x2="76" y2="68" stroke="#90c8ff" stroke-width="1.5" opacity="0.3"/>
<line x1="134" y1="78" x2="124" y2="68" stroke="#90c8ff" stroke-width="1.5" opacity="0.3"/>

<!-- lower face / chin area -->
<polygon points="80,116 120,116 114,148 86,148" fill="#b0ccee" opacity="0.3"/>
<!-- bottom seam -->
<line x1="66" y1="148" x2="134" y2="148" stroke="#6890c0" stroke-width="1.5" opacity="0.5"/>

<!-- connector to wings -->
<rect x="38" y="88" width="18" height="12" rx="3" fill="#3060a0" opacity="0.8"/>
<rect x="144" y="88" width="18" height="12" rx="3" fill="#3060a0" opacity="0.8"/>
</svg>