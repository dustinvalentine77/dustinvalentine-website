<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<defs>
  <radialGradient id="lbg" cx="50%" cy="30%" r="60%">
    <stop offset="0%" stop-color="#0e2018"/>
    <stop offset="100%" stop-color="#020a06"/>
  </radialGradient>
  <radialGradient id="lface" cx="38%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#5c3010"/>
    <stop offset="60%" stop-color="#3d1e08"/>
    <stop offset="100%" stop-color="#200c02"/>
  </radialGradient>
  <radialGradient id="lsuit" cx="35%" cy="25%" r="70%">
    <stop offset="0%" stop-color="#6aefaa"/>
    <stop offset="55%" stop-color="#42c878"/>
    <stop offset="100%" stop-color="#186038"/>
  </radialGradient>
  <filter id="lglow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="9" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="lringglow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="200" height="200" fill="url(#lbg)"/>

<!-- green ambient glow behind -->
<circle cx="100" cy="85" r="62" fill="#42c878" opacity="0.07" filter="url(#lglow)"/>

<!-- HEADPHONES — most iconic feature -->
<!-- outer arc top band -->
<path d="M42 82 Q42 28 100 28 Q158 28 158 82" stroke="#151520" stroke-width="14" fill="none" stroke-linecap="round"/>
<path d="M44 82 Q44 30 100 30 Q156 30 156 82" stroke="#252535" stroke-width="10" fill="none" stroke-linecap="round"/>
<path d="M46 82 Q46 32 100 32 Q154 32 154 82" stroke="#353545" stroke-width="6" fill="none" stroke-linecap="round"/>
<!-- green highlight on band -->
<path d="M60 40 Q100 24 140 40" stroke="#38a860" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>

<!-- ear cups -->
<ellipse cx="43" cy="88" rx="16" ry="20" fill="#101018"/>
<ellipse cx="43" cy="88" rx="13" ry="17" fill="#1e1e2e"/>
<ellipse cx="43" cy="88" rx="9" ry="12" fill="#42c878"/>
<ellipse cx="43" cy="88" rx="6" ry="8" fill="#6afaa8"/>
<ellipse cx="43" cy="88" rx="3" ry="4" fill="#c0ffe0" opacity="0.7"/>

<ellipse cx="157" cy="88" rx="16" ry="20" fill="#101018"/>
<ellipse cx="157" cy="88" rx="13" ry="17" fill="#1e1e2e"/>
<ellipse cx="157" cy="88" rx="9" ry="12" fill="#42c878"/>
<ellipse cx="157" cy="88" rx="6" ry="8" fill="#6afaa8"/>
<ellipse cx="157" cy="88" rx="3" ry="4" fill="#c0ffe0" opacity="0.7"/>

<!-- FACE -->
<circle cx="101" cy="90" r="48" fill="#180800" opacity="0.5"/>
<circle cx="100" cy="88" r="46" fill="url(#lface)"/>

<!-- hair / locs framing face -->
<path d="M56 62 Q50 80 52 105 Q48 80 52 60 Q66 38 100 36 Q134 38 148 60 Q152 80 148 105 Q150 80 144 62 Q128 44 100 42 Q72 44 56 62 Z" fill="#100800" opacity="0.9"/>
<!-- individual loc strands -->
<path d="M56 64 Q52 85 54 108" stroke="#0c0600" stroke-width="5" fill="none" stroke-linecap="round"/>
<path d="M60 55 Q54 72 56 98" stroke="#0c0600" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M144 64 Q148 85 146 108" stroke="#0c0600" stroke-width="5" fill="none" stroke-linecap="round"/>
<path d="M140 55 Q146 72 144 98" stroke="#0c0600" stroke-width="4" fill="none" stroke-linecap="round"/>

<!-- eyes -->
<ellipse cx="84" cy="84" rx="10" ry="8" fill="#0a0600"/>
<ellipse cx="116" cy="84" rx="10" ry="8" fill="#0a0600"/>
<ellipse cx="84" cy="84" rx="7" ry="6" fill="#3a2010"/>
<ellipse cx="116" cy="84" rx="7" ry="6" fill="#3a2010"/>
<circle cx="86" cy="83" r="2.5" fill="#e8d0a0" opacity="0.6"/>
<circle cx="118" cy="83" r="2.5" fill="#e8d0a0" opacity="0.6"/>

<!-- nose -->
<ellipse cx="100" cy="96" rx="5" ry="3.5" fill="#2a1206" opacity="0.6"/>

<!-- smile -->
<path d="M82 106 Q100 116 118 106" stroke="#1e0c04" stroke-width="3" fill="none" stroke-linecap="round"/>

<!-- sonic ring decoration (chest) -->
<path d="M66 140 Q100 130 134 140" stroke="#42c878" stroke-width="2.5" fill="none" opacity="0.7" filter="url(#lringglow)"/>
<path d="M58 148 Q100 136 142 148" stroke="#42c878" stroke-width="1.8" fill="none" opacity="0.45" filter="url(#lringglow)"/>

<!-- GREEN SUIT body -->
<path d="M48 148 L152 148 L168 200 L32 200 Z" fill="#186038"/>
<path d="M58 148 L142 148 L156 200 L44 200 Z" fill="url(#lsuit)"/>
<!-- suit detail line -->
<path d="M86 148 L88 200 M112 148 L114 200" stroke="#2a8050" stroke-width="2" opacity="0.5"/>
<!-- chest piece centre -->
<path d="M84 148 L116 148 L118 178 L82 178 Z" fill="#1e7040" opacity="0.8"/>
<circle cx="100" cy="162" r="8" fill="#42c878" opacity="0.5"/>
<circle cx="100" cy="162" r="5" fill="#80f0b0" opacity="0.6"/>
</svg>